id: wf2-omrs-dhis2
name: wf2-omrs-dhis2
start: cron
options: {}
steps:
  - id: create-events
    name: Create Events
    adaptor: "@openfn/language-dhis2@5.0.1"
    configuration: mtuchi@openfn.org|MSF DHIS2 UAT
    expression: ./create-events.js
    next:
      update-teis:
        disabled: false
        condition: |
          state?.teisToUpdate?.length > 0
        label: has-gender-updated
  - id: cron
    type: cron
    enabled: false
    next:
      get-patients:
        disabled: false
        condition: always
  - id: event-mappings
    name: Event Mappings
    adaptor: "@openfn/language-common@2.1.1"
    expression: ./event-mappings.js
    next:
      create-events:
        disabled: false
        condition: |
          state?.eventsMapping?.length > 0 && !state.errors
        label: has-events
  - id: get-encounters
    name: Get Encounters
    adaptor: "@openfn/language-openmrs@4.3.0"
    configuration: mtuchi@openfn.org|OpenMRS Demo
    expression: ./get-encounters.js
    next:
      get-teis-and-map-answers:
        disabled: false
        condition: |
          !state.errors && state.encounters
        label: has-encounters
  - id: get-patients
    name: Get Patients
    adaptor: "@openfn/language-openmrs@4.3.0"
    configuration: mtuchi@openfn.org|OpenMRS Demo
    expression: ./get-patients.js
    next:
      mappings:
        disabled: false
        condition: on_job_success
  - id: get-teis-and-map-answers
    name: Get TEIs and Map Answers
    adaptor: "@openfn/language-dhis2@5.0.1"
    configuration: mtuchi@openfn.org|MSF DHIS2 UAT
    expression: ./get-teis-and-map-answers.js
    next:
      event-mappings:
        disabled: false
        condition: |
          state.TEIs && !state.errors
        label: has-teis
  - id: mappings
    name: Mappings
    adaptor: "@openfn/language-http@6.5.1"
    expression: ./mappings.js
    next:
      get-encounters:
        disabled: false
        condition: |
          !state.errors && state.patients.length === 0
        label: has-no-patients
      upsert-teis:
        disabled: false
        condition: |
          state.patients.length > 0 && !state.errors
        label: has-patients
  - id: update-teis
    name: Update TEIs
    adaptor: "@openfn/language-dhis2@5.0.1"
    configuration: mtuchi@openfn.org|MSF DHIS2 UAT
    expression: ./update-teis.js
  - id: upsert-teis
    name: Upsert TEIs
    adaptor: "@openfn/language-dhis2@5.0.1"
    configuration: mtuchi@openfn.org|MSF DHIS2 UAT
    expression: ./upsert-teis.js
    next:
      get-encounters:
        disabled: false
        condition: |
          state.patientUuids && state.patientUuids.length > 0 && !state.errors
        label: has-patient-uuids
