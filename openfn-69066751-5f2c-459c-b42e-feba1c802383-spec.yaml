workflows:
  wf0-sync-metadata:
    name: wf0-sync-metadata
    jobs:
      Save-option-set-json-to-github:
        name: Save option-set json to github
        adaptor: '@openfn/language-http@6.5.4'
        credential: mtuchi@openfn.org-mtuchi-github-token
        body: |
          const metadataPath =
            'repos/OpenFn/msf-lime-metadata/contents/metadata/collections.json';

          get(metadataPath, {
            headers: {
              'user-agent': 'OpenFn',
            },
            query: {
              ref: 'collections',
            },
          });

          fn(state => {
            const {
              sourceFile,
              fileDateModified,
              syncedAt,
              formMaps,
              formMetadata,
              optsMap,
              data,
              identifiers,
              optionSetKey,
              placeOflivingMap,
            } = state;

            state.body = {
              message: 'Update metadata content',
              committer: {
                name: 'Emmanuel Evance',
                email: 'mtuchidev@gmail.com',
              },
              content: util.encode(
                JSON.stringify({
                  sourceFile,
                  fileDateModified,
                  syncedAt,
                  optionSetKey,
                  optsMap,
                  formMaps,
                  identifiers,
                  formMetadata,
                  placeOflivingMap,
                })
              ),
              sha: data.sha,
              branch: 'collections',
            };

            return state;
          });

          put(
            metadataPath,
            {
              body: $.body,
              headers: {
                Accept: 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
                'user-agent': 'OpenFn',
              },
            },
            ({ body, data, references, response, ...state }) => state
          );

      Get-metadata-file-from-Sharepoint:
        name: Get metadata file from Sharepoint
        adaptor: '@openfn/language-msgraph@0.7.11'
        credential: aleksa@openfn.org-AK-Sharepoint
        body: |
          cursor($.lastSync, { defaultValue: 'now', key: 'syncedAt' });
          cursor('now', { key: 'lastSync' });

          fn(state => {
            state.siteName = 'GRP-GVA-LIME Project';
            state.sheets = ['OptionSets', 'identifiers', 'Places of living'];
            state.folderPath = '/General/Phase II/Metadata/Shared/ready-for-test';
            return state;
          });

          get('sites', { search: $.siteName }).then(state => {
            const site = state.data.value.find(i => i.displayName === state.siteName);
            if (!site) {
              throw new Error(`Could not find sharepoint site: ${state.siteName}`);
            }
            state.siteId = site.id;

            return state;
          });

          getDrive({ id: $.siteId, owner: 'sites' });

          getFolder($.folderPath);

          fn(state => {
            let targetFile;

            // Filter for .xlsx files only
            const xlsxFiles = state.data.value.filter(file =>
              file.name.toLowerCase().endsWith('.xlsx')
            );

            if (xlsxFiles.length === 0) {
              throw new Error('No Excel (.xlsx) files found in the specified folder.');
            }

            if (state.fileName) {
              // If a specific fileName is provided, find that file among the xlsx files
              targetFile = xlsxFiles.find(file => file.name === state.fileName);

              if (!targetFile) {
                console.log(
                  `Excel file "${state.fileName}" not found. Falling back to most recent Excel file.`
                );
              }
            }

            if (!targetFile) {
              // If no fileName was provided or the specified file wasn't found,
              // sort the xlsx files by the date extracted from the filename and get the most recent
              const sortedFiles = xlsxFiles.sort((a, b) => {
                const dateA = a.lastModifiedDateTime;
                const dateB = b.lastModifiedDateTime;
                if (dateA && dateB) {
                  return dateB - dateA; // Sort in descending order (most recent first)
                }
                return 0; // If dates can't be extracted, maintain original order
              });
              targetFile = sortedFiles[0];
            }

            if (!targetFile) {
              throw new Error('No suitable Excel file found in the specified folder.');
            }

            console.log('Target Excel file:', targetFile.name);
            console.log('File date:', targetFile.lastModifiedDateTime);

            // Store the target file information in state for further use
            state.targetFile = targetFile;

            // Construct the workbookBase URL
            state.workbookBase = `sites/${state.siteId}/drives/${state.drives.default.id}/items/${targetFile.id}/workbook`;

            return state;
          });

          get(`${$.workbookBase}/worksheets('omrs-form-metadata')/usedRange`).then(
            state => {
              const [headers, ...rows] = state.data.values;
              state.formMetadata = rows
                .map(row =>
                  row.reduce((obj, value, index) => {
                    if (value) {
                      obj[headers[index]] = value;
                    }
                    return obj;
                  }, {})
                )
                .filter(obj => Object.keys(obj).length > 0 && (obj['OMRS form.uuid'] === 'patient' || obj['Active'])); //TODO: Replace Testing and patient with obj['Active'] for prod

              state.sheets.push(
                ...state.formMetadata.map(obj => obj['OMRS form sheet name'])
              );
              return state;
            }
          );

          each(
            $.sheets,
            get(`${$.workbookBase}/worksheets('${$.data}')/usedRange`).then(state => {
              const sheetName = state.references.at(-1);
              console.log('Fetched sheet: ', sheetName);
              state[sheetName] = state.data.values;
              return state;
            })
          );

          fn(state => {
            delete state.data;
            delete state.response;
            delete state.references;
            return state;
          });

      Map-metadata-file-to-option-set-Json-format:
        name: Map metadata file to option-set Json format
        adaptor: '@openfn/language-common@2.3.1'
        credential: null
        body: |
          const isValidValue = (value) => value !== "" && value !== "NA";

          const mapArrayToObject = (item, keys) => {
            return item.reduce((acc, value, idx) => {
              acc[keys[idx]] = value;
              return acc;
            }, {});
          };

          const safeKeyValuePairs = (arr, skipType = false) => {
            if (arr === null || arr === undefined) {
              return arr;
            }
            const mappedArr = arr.slice(2).map((item) => mapArrayToObject(item, arr[1]));
            try {
              return mappedArr
                .filter(
                  (o) => isValidValue(o["External ID"]) && isValidValue(o["DHIS2 DE UID"])
                )
                .reduce((acc, value) => {
                  let key = `${value['External ID'].trim()}`
                  if (!skipType) {
                    key = `${key}::${value['DHIS2 type']}`;
                  }
                  acc[value['DHIS2 DE UID']] = value['Question ID']
                    ? `${key}::${value['Question ID']}`
                    : key;
                  return acc;
                }, {});
            } catch (error) {
              console.error(`Error processing ${arr}:`, error);
              return arr; // Return original value if processing fails
            }
          };

          //New OptionSet Mappping
          const questionKeyValuePairs = (arr) => {
            if (arr === null || arr === undefined) {
              return arr;
            }
            const mappedArr = arr.slice(2).map((item) => mapArrayToObject(item, arr[1]));
            try {
              return mappedArr
                .filter(
                  (o) =>
                    isValidValue(o["External ID"]) &&
                    isValidValue(o["DHIS2 Option Set UID"])
                )
                .map((value) => ({
                  [value["DHIS2 Option Set UID"]]: value["Question ID"]
                    ? `${value["External ID"]}-${value["Question ID"]}`
                    : value["External ID"],
                }));
            } catch (error) {
              console.error(`Error processing ${arr}:`, error);
              return arr; // Return original value if processing fails
            }
          };

          fn((state) => {
            state.placeOflivingMap = state["Places of living"]
              .slice(2)
              .map((item) => mapArrayToObject(item, state["Places of living"][1]))
              .filter(
                (o) =>
                  (isValidValue(o["External ID"]) &&
                    isValidValue(o["DHIS2 DE full name"])) ||
                  (isValidValue(o["value.display - Answers"]) &&
                    isValidValue(o["DHIS2 Option code"]))
              )
              .reduce((acc, value) => {
                acc[value["Answers"]] = value["DHIS2 Option code"];
                return acc;
              }, {});

            return state;
          });

          fn((state) => {
            const { OptionSets, identifiers } = state;
            const keys = OptionSets[1];

            // state.optsMap = OptionSets.slice(2)
            //   .map((item) => mapArrayToObject(item, keys))
            //   .filter(
            //     (o) =>
            //       (isValidValue(o["External ID"]) &&
            //         isValidValue(o["DHIS2 DE full name"])) ||
            //       (isValidValue(o["value.display - Answers"]) &&
            //         isValidValue(o["DHIS2 Option code"]))
            //   )
            //   .map((o) => {

            //     return {
            //       "DHIS2 Option Set UID": o["DHIS2 Option Set UID"],
            //       "DHIS2 Option name": o["DHIS2 Option name"],
            //       "DHIS2 Option UID": o["DHIS2 Option UID"],
            //       "DHIS2 Option Code": o["DHIS2 Option code"],
            //       "value.display - Answers": o["Answers"],
            //       "value.uuid - External ID": o["Question ID"]
            //         ? `${o["External ID"]}-${o["Question ID"]}`
            //         : o["External ID"],
            //       "DHIS2 DE UID": o["DHIS2 DE UID"],
            //     };
            //   });
            const filteredOptionSets = OptionSets.slice(2)
              .map((item) => mapArrayToObject(item, keys))
              .filter(
                (o) =>
                  (isValidValue(o["External ID"]) &&
                    isValidValue(o["DHIS2 DE full name"])) ||
                  (isValidValue(o["value.display - Answers"]) &&
                    isValidValue(o["DHIS2 Option code"]))
              );

            // Define the column indexes
            const columns = [
              "DHIS2 Option Set UID",
              "DHIS2 Option name",
              "DHIS2 Option UID",
              "DHIS2 Option Code",
              "value.display - Answers",
              "value.uuid - External ID",
              "DHIS2 DE UID"
            ];

            // Map each object to an array of values
            const rows = filteredOptionSets.map(o => [
              o["DHIS2 Option Set UID"],
              o["DHIS2 Option name"],
              o["DHIS2 Option UID"],
              o["DHIS2 Option code"],
              o["Answers"],
              o["Question ID"] ? `${o["External ID"]}-${o["Question ID"]}` : o["External ID"],
              o["DHIS2 DE UID"]
            ]);

            state.optsMap = { columns, rows }

            const [iheaders, ...irows] = identifiers;
            state.identifiers = irows
              .map((row) =>
                row.reduce((obj, value, index) => {
                  if (value != null && value !== "") {
                    obj[iheaders[index]] = value;
                  }
                  return obj;
                }, {})
              )
              .filter((obj) => Object.keys(obj).length > 0);
            return state;
          });

          fn((state) => {
            const {
              optsMap,
              syncedAt,
              lastSync,
              targetFile,
              identifiers,
              formMetadata,
              placeOflivingMap,
            } = state;

            const sourceFile = targetFile.name;
            const fileDateModified = targetFile.lastModifiedDateTime;

            const formMaps = formMetadata.reduce((acc, form) => {
              const formName = form["OMRS form sheet name"];
              acc[form["OMRS form.uuid"]] = {
                formName,
                orgUnit: form["DHIS2 orgUnit ID"],
                syncType: form["Sync Type"],
                programId: form["DHIS2 program ID"],
                programStage: form["DHIS2 programStage ID"],
                dataValueMap: safeKeyValuePairs(state[formName], formName === "F00-Registration"),
                optionSetMap: questionKeyValuePairs(state[formName]),
              };

              return acc;
            }, {});

            const optionSetKey = Object.entries(formMaps).reduce(
              (acc, [formKey, formValue]) => {
                formValue.optionSetMap.forEach((item) => {
                  const [originalKey, originalValue] = Object.entries(item)[0];
                  acc[`${formKey}-${originalValue}`] = originalKey;
                });
                return acc;
              },
              {}
            );

            return {
              lastSync,
              syncedAt,
              formMaps,
              optsMap,
              sourceFile,
              identifiers,
              formMetadata,
              optionSetKey,
              fileDateModified,
              placeOflivingMap,
            };
          });

      Save-Wf1-Metadata-to-GitHub:
        name: Save Wf1 Metadata to GitHub
        adaptor: '@openfn/language-http@6.5.4'
        credential: mtuchi@openfn.org-mtuchi-github-token
        body: |
          const metadataPath =
              'repos/OpenFn/msf-lime-metadata/contents/metadata/wf1-collections.json';

          get(metadataPath, {
              headers: {
                  'user-agent': 'OpenFn',
              },
              query: {
                  ref: 'collections',
              },
          });

          fn(state => {
              const {
                  data,
                  lastSync,
                  statusMap,
                  syncedAt,
                  formMaps,
                  sourceFile,
                  identifiers,
                  fileDateModified,
                  nationalityMap,
                  missingStatusMap
              } = state;

              state.body = {
                  message: 'Update metadata content',
                  committer: {
                      name: 'Emmanuel Evance',
                      email: 'mtuchidev@gmail.com',
                  },
                  content: util.encode(
                      JSON.stringify({
                          lastSync,
                          statusMap,
                          syncedAt,
                          formMaps,
                          sourceFile,
                          identifiers,
                          fileDateModified,
                          nationalityMap,
                          missingStatusMap
                      })
                  ),
                  sha: data.sha,
                  branch: 'collections',
              };

              return state;
          });

          put(
              metadataPath,
              {
                  body: $.body,
                  headers: {
                      Accept: 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'user-agent': 'OpenFn',
                  },
              },
              ({ body, data, references, response, ...state }) => state
          );

      Map-metadata-file-for-WF1:
        name: Map metadata file for WF1
        adaptor: '@openfn/language-common@2.1.1'
        credential: null
        body: |
          const isValidValue = (value) => value !== "" && value !== "NA";

          const mapArrayToObject = (item, keys) => {
              return item.reduce((acc, value, idx) => {
                  acc[keys[idx]] = value;
                  return acc;
              }, {});
          };

          const safeKeyValuePairs = (arr) => {
              if (arr === null || arr === undefined) {
                  return arr;
              }
              const mappedArr = arr.slice(2).map((item) => mapArrayToObject(item, arr[1]));
              try {
                  return mappedArr
                      .filter(
                          (o) => isValidValue(o["External ID"]) && isValidValue(o["DHIS2 DE UID"])
                      )
                      .reduce((acc, value) => {
                          acc[value["DHIS2 DE UID"]] = value["Question ID"]
                              ? `${value["External ID"]}-${value["Question ID"]}`
                              : value["External ID"];
                          return acc;
                      }, {});
              } catch (error) {
                  console.error(`Error processing ${arr}:`, error);
                  return arr; // Return original value if processing fails
              }
          };

          //New OptionSet Mappping
          const questionKeyValuePairs = (arr) => {
              if (arr === null || arr === undefined) {
                  return arr;
              }
              const mappedArr = arr.slice(2).map((item) => mapArrayToObject(item, arr[1]));
              try {
                  return mappedArr
                      .filter(
                          (o) =>
                              isValidValue(o["External ID"]) &&
                              isValidValue(o["DHIS2 Option Set UID"])
                      )
                      .map((value) => ({
                          [value["DHIS2 Option Set UID"]]: value["Question ID"]
                              ? `${value["External ID"]}-${value["Question ID"]}`
                              : value["External ID"],
                      }));
              } catch (error) {
                  console.error(`Error processing ${arr}:`, error);
                  return arr; // Return original value if processing fails
              }
          };

          fn((state) => {
              state.placeOflivingMap = state["Places of living"]
                  .slice(2)
                  .map((item) => mapArrayToObject(item, state["Places of living"][1]))
                  .filter(
                      (o) =>
                          (isValidValue(o["External ID"]) &&
                              isValidValue(o["DHIS2 DE full name"])) ||
                          (isValidValue(o["value.display - Answers"]) &&
                              isValidValue(o["DHIS2 Option code"]))
                  )
                  .reduce((acc, value) => {
                      acc[value["Answers"]] = value["DHIS2 Option code"];
                      return acc;
                  }, {});

              return state;
          });

          fn((state) => {
              const { OptionSets, identifiers } = state;
              const keys = OptionSets[1];

              const optsMap = OptionSets.slice(2)
                  .map((item) => mapArrayToObject(item, keys))
                  .filter(
                      (o) =>
                          (isValidValue(o["External ID"]) &&
                              isValidValue(o["DHIS2 DE full name"])) ||
                          (isValidValue(o["value.display - Answers"]) &&
                              isValidValue(o["DHIS2 Option code"]))
                  )
                  .map((o) => {

                      return {
                          "DHIS2 Option Set UID": o["DHIS2 Option Set UID"],
                          "DHIS2 Option name": o["DHIS2 Option name"],
                          "DHIS2 Option UID": o["DHIS2 Option UID"],
                          "DHIS2 Option Code": o["DHIS2 Option code"],
                          "value.display - Answers": o["Answers"],
                          "value.uuid - External ID": o["Question ID"]
                              ? `${o["External ID"]}-${o["Question ID"]}`
                              : o["External ID"],
                          "DHIS2 DE UID": o["DHIS2 DE UID"],
                          "DHIS2 DE full name": o["DHIS2 DE full name"],
                          // "OptionSet name": o["OptionSet name"],
                          // "DHIS2 Option Set name": o["DHIS2 Option Set name"],
                      };
                  });

              state.nationalityMap = optsMap
                  .filter(o => o['DHIS2 DE full name'] === 'Nationality')
                  .reduce((acc, value) => {
                      acc[value['DHIS2 Option Code']] = value['value.uuid - External ID'];
                      return acc;
                  }, {});

              
              state.statusMap = optsMap
                  .filter(o => typeof o['DHIS2 DE full name'] === 'string' && o['DHIS2 DE full name'].includes('status'))
                  .reduce((acc, value) => {
                      acc[value['DHIS2 Option Code']] = value['value.uuid - External ID'];
                      return acc;
                  }, {});

              const [iheaders, ...irows] = identifiers;
              state.identifiers = irows
                  .map((row) =>
                      row.reduce((obj, value, index) => {
                          if (value != null && value !== "") {
                              obj[iheaders[index]] = value;
                          }
                          return obj;
                      }, {})
                  )
                  .filter((obj) => Object.keys(obj).length > 0);
              return state;
          });

          fn((state) => {
              const {
                  syncedAt,
                  lastSync,
                  statusMap,
                  targetFile,
                  identifiers,
                  formMetadata,
                  nationalityMap,
              } = state;

              const sourceFile = targetFile.name;
              const fileDateModified = targetFile.lastModifiedDateTime;

              const formMaps = formMetadata.reduce((acc, form) => {
                  const formName = form["OMRS form sheet name"];
                  acc[form["OMRS form.uuid"]] = {
                      formName,
                      orgUnit: form["DHIS2 orgUnit ID"],
                      syncType: form["Sync Type"],
                      programId: form["DHIS2 program ID"],
                      programStage: form["DHIS2 programStage ID"],
                      dataValueMap: safeKeyValuePairs(state[formName]),
                      optionSetMap: questionKeyValuePairs(state[formName]),
                  };

                  return acc;
              }, {});



              return {
                  lastSync,
                  statusMap,
                  syncedAt,
                  formMaps,
                  sourceFile,
                  identifiers,
                  fileDateModified,
                  nationalityMap,
                  // optsMap,
                  // formMetadata,
                  // optionSetKey,
                  // placeOflivingMap,
              };
          });

    triggers:
      webhook:
        type: webhook
        webhook_reply: before_start
        enabled: true
    edges:
      webhook->Get-metadata-file-from-Sharepoint:
        source_trigger: webhook
        target_job: Get-metadata-file-from-Sharepoint
        condition_type: always
        enabled: true
      Get-metadata-file-from-Sharepoint->Map-metadata-file-to-option-set-Json-format:
        source_job: Get-metadata-file-from-Sharepoint
        target_job: Map-metadata-file-to-option-set-Json-format
        condition_type: on_job_success
        enabled: true
      Map-metadata-file-to-option-set-Json-format->Save-option-set-json-to-github:
        source_job: Map-metadata-file-to-option-set-Json-format
        target_job: Save-option-set-json-to-github
        condition_type: on_job_success
        enabled: true
      Get-metadata-file-from-Sharepoint->Map-metadata-file-for-WF1:
        source_job: Get-metadata-file-from-Sharepoint
        target_job: Map-metadata-file-for-WF1
        condition_type: on_job_success
        enabled: true
      Map-metadata-file-for-WF1->Save-Wf1-Metadata-to-GitHub:
        source_job: Map-metadata-file-for-WF1
        target_job: Save-Wf1-Metadata-to-GitHub
        condition_type: on_job_success
        enabled: true
