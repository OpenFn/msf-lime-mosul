workflows:
  wf0-sync-metadata:
    name: wf0-sync-metadata
    jobs:
      Save-option-set-json-to-collections-main:
        name: Save option-set json to collections main
        adaptor: '@openfn/language-common@latest'
        credential: null
        body: |
          // Check out the Job Writing Guide for help getting started:
          // https://docs.openfn.org/documentation/jobs/job-writing-guide
          // Cleanup: remove all collections data
          collections.remove('mosul-metadata-mappings', '*');

          collections.set('mosul-metadata-mappings', 'syncedAt', $.syncedAt);
          collections.set('mosul-metadata-mappings', 'sourceFile', $.sourceFile);
          collections.set(
            'mosul-metadata-mappings',
            'formMetadata',
            $.formMetadata
          );
          collections.set(
            'mosul-metadata-mappings',
            'fileDateModified',
            $.fileDateModified
          );

          collections.set(
            'mosul-metadata-mappings',
            'optionSetKey',
            $.optionSetKey
          );

          collections.set('mosul-metadata-mappings', 'formMaps', $.formMaps);

          collections.set(
            'mosul-metadata-mappings',
            'placeOflivingMap',
            $.placeOflivingMap
          );

          let itemCount = 0;
          collections.set(
            'mosul-metadata-mappings',
            i => `optsMap-value-${++itemCount}`,
            $.optsMap
          );

          itemCount = 0;
          collections.set(
            'mosul-metadata-mappings',
            i => `identifiers-value-${++itemCount}`,
            $.identifiers
          );

      Warn-admin-of-errors:
        name: Warn admin of errors
        adaptor: '@openfn/language-common@2.1.1'
        credential: null
        body: |
          fn(state => {
           
            const DENameNotMatched = state.DENameNotMatched || [];
            const OptionUIDNotMatched = state.OptionUIDNotMatched || [];
            const OptionNameNotMatched = state.OptionNameNotMatched || [];

            // Combine all warning lists into one object
            const warningSummary = {
              DENameNotMatched,
              OptionUIDNotMatched,
              OptionNameNotMatched,
            };

            // Check whether we have any warnings
            const hasWarnings =
              DENameNotMatched.length > 0 ||
              OptionUIDNotMatched.length > 0 ||
              OptionNameNotMatched.length > 0;

            if (hasWarnings) {
              console.log('******DHIS2 metadata Warnings found:******');
              console.log(JSON.stringify(warningSummary, null, 2));
            } else {
              console.log('No DHIS2 metadata warnings detected.');
            }

            // Keep the warnings in state 
            state.warningSummary = warningSummary;

            return state;
          });

      Throw-Errors:
        name: Throw Errors
        adaptor: '@openfn/language-common@2.1.1'
        credential: null
        body: |
          fn(state => {

            const DEIdNotFound = state.DEIdNotFound || [];
            const OptionUIDNotMatched = state.OptionUIDNotMatched || [];
            const OptionCodeNotMatched = state.OptionCodeNotMatched || [];


            const errorSummary = {
              DEIdNotMatched: DEIdNotFound,
              OptionUIDNotMatched,
              OptionCodeNotMatched,
            };


            const hasErrors =
              DEIdNotFound.length > 0 ||
              OptionUIDNotMatched.length > 0 ||
              OptionCodeNotMatched.length > 0;


            state.validationErrorSummary = errorSummary;

            if (hasErrors) {
              // Throw if errors exist
              const message =
                '****** Validation errors found in DHIS2 metadata checks:\n' +
                JSON.stringify(errorSummary, null, 2);

              throw new Error(message);
            }

            return state;
          });

      Check-if-Option-Set-and-options-UID-matches:
        name: Check if Option Set and options UID matches
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: mtuchi@openfn.org-MSF-DHIS2-UAT
        body: |
          fn(state => {
            // Initialize array to track OptionSet UID mismatches
            state.OptionSetUIDNotMatched = state.OptionSetUIDNotMatched || [];

            // Get the fetched program stage data from previous job
            const fetchedDataEntryData = state.fetchedDataEntryData || [];


            // Process each program stage's data elements
            fetchedDataEntryData.forEach((programStageData, index) => {

              if (programStageData.programStageDataElements) {
                programStageData.programStageDataElements.forEach(element => {
                  const dataElementId = element.dataElement.id;
                  const dhis2OptionSetUid = element.dataElement.optionSet?.id;

                  // Only validate if the data element has an option set in DHIS2
                  if (dhis2OptionSetUid) {
                    // Find corresponding entry in optsMap using DHIS2 DE UID
                    const optsMapEntry = state.optsMap?.find(opts => opts["DHIS2 DE UID"] === dataElementId);

                    if (optsMapEntry) {
                      const xlsOptionSetUid = optsMapEntry["DHIS2 Option Set UID"];

                      // Compare OptionSet UIDs
                      if (xlsOptionSetUid && xlsOptionSetUid !== dhis2OptionSetUid) {
                        const errorMessage = `Option Set UID mismatch for Data Element ${dataElementId}: XLS UID '${xlsOptionSetUid}' does not match DHIS2 UID '${dhis2OptionSetUid}'.`;

                        state.OptionSetUIDNotMatched.push(errorMessage);
                      }
                    }
                    //  else {
                    //   console.log(`No optsMap entry found for Data Element ${dataElementId}`);
                    // }
                  }
                });
              }
            });


            // Group optsMap by DHIS2 Option Set UID
            const groupedByOptionSet = (state.optsMap || []).reduce((groups, entry) => {
              const optionSetUid = entry["DHIS2 Option Set UID"];

              if (optionSetUid) {
                if (!groups[optionSetUid]) {
                  groups[optionSetUid] = [];
                }
                groups[optionSetUid].push(entry);
              }
              return groups;
            }, {});

            state.groupedByOptionSet = groupedByOptionSet;

            // Get unique DHIS2 Option Set UIDs for API calls
            const uniqueOptionSetUids = Object.keys(groupedByOptionSet);
            state.uniqueOptionSetUids = uniqueOptionSetUids;

            console.log(`OptionSet UID validation complete: ${state.OptionSetUIDNotMatched.length} mismatches found`);
            return state;
          });


          // Fetch OptionSets data for each unique DHIS2 Option Set UID
          each(
            '$.uniqueOptionSetUids[*]',
            get(
              state => `optionSets/${state.data}?fields=id,name,options[id,name,code]`)
              .catch((error, state) => {
                // ...
                return state;
              })
              .then((state) => {

                // Initialize optionSetsData 
                if (!state.optionSetsData) {
                  state.optionSetsData = {};
                }

                // Store fetched optionSet data
                const optionSetUid = state.data.id;
                state.optionSetsData[optionSetUid] = state.data;


                return state;
              })

          );

          fn(state => {

            state.OptionUIDNotMatched = state.OptionUIDNotMatched || [];
            state.OptionNameNotMatched = state.OptionNameNotMatched || [];
            state.OptionCodeNotMatched = state.OptionCodeNotMatched || [];

            const groupedByOptionSet = state.groupedByOptionSet || {};
            const optionSetsData = state.optionSetsData || {};

            // For each Option Set UID from the XLS mapping
            Object.entries(groupedByOptionSet).forEach(([optionSetUid, rows]) => {
              const optionSet = optionSetsData[optionSetUid];

              if (!optionSet) {
                // console.log(`No DHIS2 OptionSet data found for UID ${optionSetUid}`);
                return;
              }

              // Build a map: option UID -> { name, code } from DHIS2
              const dhis2OptionsById = new Map(
                (optionSet.options || [])
                  .filter(opt => opt != null)
                  .map(opt => [
                    opt.id,
                    { name: opt.name, code: opt.code }
                  ])
              );

              // Compare each XLS row in OptionSet
              rows.forEach(entry => {
                const optionUid = entry['DHIS2 Option UID'];
                const xlsName = entry['DHIS2 Option Name'];
                const xlsCode = entry['DHIS2 Option Code'];


                if (!optionUid) return;

                const dhis2Option = dhis2OptionsById.get(optionUid);

                // 1. Option UID must exist in DHIS2 OptionSet
                if (!dhis2Option) {
                  const msg = `Option UID ${optionUid} not found in DHIS2 Option Set ${optionSetUid}.`;
                  state.OptionUIDNotMatched.push(msg);
                  return;
                }

                // 2. Compare names
                const dhis2Name = dhis2Option.name || '';
                const xlsNameNorm = (xlsName || '').trim().toLowerCase();
                const dhis2NameNorm = (dhis2Name || '').trim().toLowerCase();

                if (xlsNameNorm && dhis2NameNorm && xlsNameNorm !== dhis2NameNorm) {
                  const msg = `Option name mismatch for Option UID ${optionUid}: XLS name '${xlsName}' does not match DHIS2 name '${dhis2Name}'.`;
                  state.OptionNameNotMatched.push(msg);
                }

                // 2. Compare codes
                const dhis2Code = dhis2Option.code || '';
                const xlsCodeNorm = (xlsCode || '').trim().toLowerCase();
                const dhis2CodeNorm = (dhis2Code || '').trim().toLowerCase();

                if (xlsCodeNorm && dhis2CodeNorm && xlsCodeNorm !== dhis2CodeNorm) {
                  const msg = `Option code mismatch for Option UID ${optionUid}: XLS code '${xlsCode}' does not match DHIS2 code '${dhis2Code}'.`;
                  state.OptionCodeNotMatched.push(msg);
                }

              });
            });

            return state;
          });

      Check-if-Data-Elements-Exist-in-DHIS2:
        name: Check if Data Elements Exist in DHIS2
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: mtuchi@openfn.org-MSF-DHIS2-UAT
        body: |
          fn(state => {

            const programStageIds = Object.values(state.formMaps);
            state.fetchedDataEntryData = [];
            state.extractedDataValueMaps = {};
            state.DEIdNotFound=[];
              state.DENameNotMatched = [];

            Object.entries(state.formMaps).forEach(([formUuid, values]) => {
              if (state.formMaps[formUuid] && state.formMaps[formUuid].dataValueMap) {
                state.extractedDataValueMaps[values.programStage] = {
                  formUuid,
                  dataValueMap: state.formMaps[formUuid].dataValueMap
                };
              }
            });

            return { programStageIds, ...state };
          })

          each('$.programStageIds[*]', get(state => `programStages/${state.data.programStage}.json?fields=programStageDataElements[dataElement[id,name,optionSet[id, name]]]`).then(state => {

            state.fetchedDataEntryData.push(state.data)
            return state
          }))


          fn(state => {
            state.comparison = [];
            state.missingDataElements = [];
            
            state.fetchedDataEntryData.forEach((programStageData, index) => {
              const programStageId = state.programStageIds[index];
              const extractedData = state.extractedDataValueMaps[programStageId.programStage];
              
              if (extractedData) {
                // Create a Set of valid DHIS2 data element IDs for fast lookup
                const validDhis2DataElementIds = new Set(
                  programStageData.programStageDataElements?.map(element => element.dataElement.id) || []
                );

                  const dhis2DataElementNames = new Map(
                  programStageData.programStageDataElements?.map(element => [
                    element.dataElement.id, 
                    element.dataElement.name
                  ]) || []
                );
                
                const comparison = {
                  programStageId: programStageId.programStage,
                  formUuid: extractedData.formUuid,
                  totalFormDataElements: Object.keys(extractedData.dataValueMap).length,
                  validFormDataElements: 0,
                  invalidFormDataElements: 0,
                  nameMatchedElements: 0,
                  nameMismatchedElements: 0,
                  results: []
                };
                
                // Check each data element from state against DHIS2 API response
                Object.entries(extractedData.dataValueMap).forEach(([dataElementId, value]) => {
                  const existsInDhis2 = validDhis2DataElementIds.has(dataElementId);
                   let nameMatches = null;
                  let xlsName = null;
                  let dhis2Name = null;
                  
                  if (existsInDhis2) {
                    comparison.validFormDataElements++;

                              // Check name match for existing data elements
                    dhis2Name = dhis2DataElementNames.get(dataElementId);
                    // Find corresponding name from optsMap using "DHIS2 DE UID"
                    const optsMapEntry = state.optsMap?.find(opts => opts["DHIS2 DE UID"] === dataElementId);
                    if (optsMapEntry) {
                      xlsName = optsMapEntry["DHIS2 DE Name"];
                      
                      // Compare names (case-insensitive trim comparison)
                      nameMatches = xlsName && xlsName.trim().toLowerCase() === dhis2Name.trim().toLowerCase();
                      
                      if (nameMatches) {
                        comparison.nameMatchedElements++;
                      } else {
                        comparison.nameMismatchedElements++;
                        
                        const nameErrorMessage = `Data Element ${dataElementId} name mismatch: XLS name '${xlsName}' does not match DHIS2 name '${dhis2Name}'.`;
                        state.DENameNotMatched.push(nameErrorMessage);
                      }
                    }
                  } else {
                    comparison.invalidFormDataElements++;
                    
                    // Collect data elements from state that don't exist in DHIS2
                    state.missingDataElements.push({
                      programStageId: programStageId.programStage,
                      formUuid: extractedData.formUuid,
                      dataElementId,
                      value,
                      message: `Data Element ${dataElementId} not found in DHIS2 program stage ${programStageId.programStage}`
                    });

                    state.DEIdNotFound.push(`Data Element ${dataElementId} not found in DHIS2 program stage ${programStageId.programStage}`)
                  }
                  
                  comparison.results.push({
                    dataElementId,
                    value,
                    existsInDhis2,
                    xlsName,
                    dhis2Name,
                    nameMatches
                  });
                });
                
                state.comparison.push(comparison);
              }
            });
            
            return state;
          });

      Add-Errors-to-GoogleSheet:
        name: Add Errors to GoogleSheet
        adaptor: '@openfn/language-googlesheets@4.0.7'
        credential: mtuchi@openfn.org-mtuchi-gsheet
        body: |
          const spreadsheetId = '1Hnd2vMC7cK5OMksk5-4lv_OpqkXA1zSo1DrbtnopLtg'

          each($.sheetsMapping, batchUpdateValues({
            spreadsheetId,
            range: $.data.range,
            values: $.data.values
          }))

      Prepare-Mapping-Per-Sheet:
        name: Prepare Mapping Per Sheet
        adaptor: '@openfn/language-http@7.2.6'
        credential: mtuchi@openfn.org-mtuchi-gsheet
        body: |
          
          const baseUrl = "https://sheets.googleapis.com/v4/spreadsheets";
          const gsheetId = "1Hnd2vMC7cK5OMksk5-4lv_OpqkXA1zSo1DrbtnopLtg";
          const genSheets = (sourceFile) => {
            const todayDate = new Date().toISOString().split("T")[0];

            const shortFile = sourceFile
              .split("LIME EMR - Iraq Metadata - Release 1 -")[1]
              .replace(/\s+/g, "")
              .toLowerCase();
            const sheetAffix = `${shortFile}:runDate:${todayDate}`;
            return [`WarningErrors:${sheetAffix}`, `FailingErrors:${sheetAffix}`];
          };
          fn((state) => {
            state.sheets = genSheets(state.sourceFile);
            return state;
          });

          get(`${baseUrl}/${gsheetId}`, {
            headers: { Authorization: `Bearer ${$.configuration.access_token}` },
          });

          fn((state) => {
            const existingSheets = state.data.sheets.map((s) => s.properties.title);
            state.newSheets ??= [];
            state.sheets.forEach((sheet) => {
              if (!existingSheets.includes(sheet)) {
                state.newSheets.push(sheet);
              }
            });
            return state;
          });

          each(
            $.newSheets,
            post(
              `${baseUrl}/${gsheetId}:batchUpdate`,
              {
                requests: [
                  {
                    addSheet: {
                      properties: {
                        title: $.data,
                      },
                    },
                  },
                ],
              },
              {
                headers: {
                  Authorization: (state) => `Bearer ${state.configuration.access_token}`,
                },
              }
            )
          );

          fn((state) => {
            state.sheetsMapping = state.sheets.map((s) => {
              if (s.includes("WarningErrors:")) {
                const warningValues = [["Error Type", "Error Message"]];
                Object.entries(state.warningSummary).forEach(([header, values]) => {
                  const rows = values.map((v) => [header, v]);
                  warningValues.push(...rows);
                });
                return {
                  range: `${s}!A:B`,
                  values: warningValues,
                };
              }
              if (s.includes("FailingErrors:")) {
                const DEIdNotFound = state.DEIdNotFound || [];
                const OptionUIDNotMatched = state.OptionUIDNotMatched || [];
                const OptionCodeNotMatched = state.OptionCodeNotMatched || [];
                const OptionSetUIDNotMatched = state.OptionSetUIDNotMatched || [];

                const errorSummary = {
                  DEIdNotMatched: DEIdNotFound,
                  OptionUIDNotMatched,
                  OptionCodeNotMatched,
                  OptionSetUIDNotMatched,
                  // optionSetNotDefinedInOptionSetsSheet,
                };
                const errorsValues = [["Error Type", "Error Message"]];
                Object.entries(errorSummary).forEach(([header, values]) => {
                  const rows = values.map((v) => [header, v]);
                  errorsValues.push(...rows);
                });
                return {
                  range: `${s}!A:B`,
                  values: errorsValues,
                };
              }
            });

            return state;
          });

      Save-option-set-json-to-github:
        name: Save option-set json to github
        adaptor: '@openfn/language-http@6.5.4'
        credential: null
        body: |
          const metadataPath =
            'repos/OpenFn/msf-lime-metadata/contents/metadata/collections.json';

          get(metadataPath, {
            headers: {
              'user-agent': 'OpenFn',
            },
            query: {
              ref: 'collections',
            },
          });

          fn(state => {
            const {
              sourceFile,
              fileDateModified,
              syncedAt,
              formMaps,
              formMetadata,
              optsMap,
              data,
              identifiers,
              optionSetKey,
              placeOflivingMap,
            } = state;

            state.body = {
              message: 'Update metadata content',
              committer: {
                name: 'Emmanuel Evance',
                email: 'mtuchidev@gmail.com',
              },
              content: util.encode(
                JSON.stringify({
                  sourceFile,
                  fileDateModified,
                  syncedAt,
                  optionSetKey,
                  optsMap,
                  formMaps,
                  identifiers,
                  formMetadata,
                  placeOflivingMap,
                })
              ),
              sha: data.sha,
              branch: 'collections',
            };

            return state;
          });

          put(
            metadataPath,
            {
              body: $.body,
              headers: {
                Accept: 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
                'user-agent': 'OpenFn',
              },
            },
            ({ body, data, references, response, ...state }) => state
          );

      Get-metadata-file-from-Sharepoint:
        name: Get metadata file from Sharepoint
        adaptor: '@openfn/language-msgraph@0.7.11'
        credential: ludovic.rossel@geneva.msf.org-LIME-OpenFn-Credential
        body: |
          const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          cursor($.lastSync, { defaultValue: 'now', key: 'syncedAt' });
          cursor('now', { key: 'lastSync' });

          fn(state => {
            state.siteName = 'GRP-GVA-LIME Project';
            state.sheets = ['OptionSets', 'identifiers', 'Places of living'];
            state.folderPath = '/General/Phase II/Metadata/Shared/ready-for-test';
            return state;
          });

          get('sites', { search: $.siteName }).then(state => {
            const site = state.data.value.find(i => i.displayName === state.siteName);
            if (!site) {
              throw new Error(`Could not find sharepoint site: ${state.siteName}`);
            }
            state.siteId = site.id;

            return state;
          });

          getDrive({ id: $.siteId, owner: 'sites' });

          getFolder($.folderPath);

          fn(state => {
            let targetFile;

            // Filter for .xlsx files only
            const xlsxFiles = state.data.value.filter(file =>
              file.name.toLowerCase().endsWith('.xlsx')
            );

            if (xlsxFiles.length === 0) {
              throw new Error('No Excel (.xlsx) files found in the specified folder.');
            }

            if (state.fileName) {
              // If a specific fileName is provided, find that file among the xlsx files
              targetFile = xlsxFiles.find(file => file.name === state.fileName);

              if (!targetFile) {
                console.log(
                  `Excel file "${state.fileName}" not found. Falling back to most recent Excel file.`
                );
              }
            }

            if (!targetFile) {
              // If no fileName was provided or the specified file wasn't found,
              // sort the xlsx files by the date extracted from the filename and get the most recent
              const sortedFiles = xlsxFiles.sort((a, b) => {
                const dateA = a.lastModifiedDateTime;
                const dateB = b.lastModifiedDateTime;
                if (dateA && dateB) {
                  return dateB - dateA; // Sort in descending order (most recent first)
                }
                return 0; // If dates can't be extracted, maintain original order
              });
              targetFile = sortedFiles[0];
            }

            if (!targetFile) {
              throw new Error('No suitable Excel file found in the specified folder.');
            }

            console.log('Target Excel file:', targetFile.name);
            console.log('File date:', targetFile.lastModifiedDateTime);

            // Store the target file information in state for further use
            state.targetFile = targetFile;

            // Construct the workbookBase URL
            state.workbookBase = `sites/${state.siteId}/drives/${state.drives.default.id}/items/${targetFile.id}/workbook`;

            return state;
          });

          get(`${$.workbookBase}/worksheets('omrs-form-metadata')/usedRange`).then(
            state => {
              const [headers, ...rows] = state.data.values;
              state.formMetadata = rows
                .map(row =>
                  row.reduce((obj, value, index) => {
                    if (value) {
                      obj[headers[index]] = value;
                    }
                    return obj;
                  }, {})
                )
                .filter(obj => Object.keys(obj).length > 0 && (obj['Active'] || obj['Testing']));

              state.sheets.push(
                ...state.formMetadata.map(obj => obj['OMRS form sheet name'])
              );
              return state;
            }
          );

          each(
            $.sheets,
            get(`${$.workbookBase}/worksheets('${$.data}')/usedRange`).then(state => {
              const sheetName = state.references.at(-1);
              console.log('Fetched sheet: ', sheetName);
              state[sheetName] = state.data.values;
              return state;
            }).then(async (state) => {
              await delay(2000);
              return state;
            })
          );

          fn(state => {
            delete state.data;
            delete state.response;
            delete state.references;
            return state;
          });

      Map-metadata-file-to-option-set-Json-format:
        name: Map metadata file to option-set Json format
        adaptor: '@openfn/language-common@2.3.1'
        credential: null
        body: |
          const isValidValue = value => value !== '' && value !== 'NA';

          const mapArrayToObject = (item, keys) => {
            return item.reduce((acc, value, idx) => {
              acc[keys[idx]] = value;
              return acc;
            }, {});
          };

          const safeKeyValuePairs = arr => {
            if (arr === null || arr === undefined) {
              return arr;
            }
            const mappedArr = arr.slice(2).map(item => mapArrayToObject(item, arr[1]));
            try {
              return mappedArr
                .filter(
                  o => isValidValue(o['External ID']) && isValidValue(o['DHIS2 DE UID'])
                )
                .reduce((acc, value) => {
                  const key = `${value['External ID']}::${value['DHIS2 type'].toLowerCase()}`;
                  acc[value['DHIS2 DE UID']] = value['Question ID']
                    ? `${key}::${value['Question ID']}`
                    : key;
                  return acc;
                }, {});
            } catch (error) {
              console.error(`Error processing ${arr}:`, error);
              return arr; // Return original value if processing fails
            }
          };

          const extractMultiQns = arr => {
            if (arr === null || arr === undefined) {
              return arr;
            }
            const mappedArr = arr.slice(2).map(item => mapArrayToObject(item, arr[1]));
            try {
              const multiSelectQuestions = mappedArr
                .filter(o => isValidValue(o['Question #']))
                .reduce((acc, value) => {
                  if (value['Multi-Select Answer External IDs']) {
                    if (!acc[value['Question #']]) {
                      acc[value['Question #']] = {
                        extId: value['External ID'],
                        qid: value['Question ID'],
                        qns: [
                          {
                            clde: value['CL DHIS2 DE UID'],
                            type: value['DHIS2 type'],
                            multiAns: value['Multi-Select Answer External IDs'],
                          },
                        ],
                      };
                    } else {
                      acc[value['Question #']].qns.push({
                        clde: value['CL DHIS2 DE UID'],
                        type: value['DHIS2 type'],
                        multiAns: value['Multi-Select Answer External IDs'],
                      });
                    }
                  }

                  return acc;
                }, {});
              return Object.values(multiSelectQuestions);
            } catch (error) {
              console.error(`Error processing ${arr}:`, error);
              return arr; // Return original value if processing fails
            }
          };

          //New OptionSet Mappping
          const questionKeyValuePairs = arr => {
            if (arr === null || arr === undefined) {
              return arr;
            }
            const mappedArr = arr.slice(2).map(item => mapArrayToObject(item, arr[1]));
            try {
              return mappedArr
                .filter(
                  o =>
                    isValidValue(o['External ID']) &&
                    isValidValue(o['DHIS2 Option Set UID'])
                )
                .map(value => ({
                  [value['DHIS2 Option Set UID']]: value['Question ID']
                    ? `${value['External ID']}-${value['Question ID']}`
                    : value['External ID'],
                }));
            } catch (error) {
              console.error(`Error processing ${arr}:`, error);
              return arr; // Return original value if processing fails
            }
          };

          fn(state => {
            state.placeOflivingMap = state['Places of living']
              .slice(2)
              .map(item => mapArrayToObject(item, state['Places of living'][1]))
              .filter(
                o =>
                  (isValidValue(o['External ID']) &&
                    isValidValue(o['DHIS2 DE full name'])) ||
                  (isValidValue(o['value.display - Answers']) &&
                    isValidValue(o['DHIS2 Option code']))
              )
              .reduce((acc, value) => {
                acc[value['Answers']] = value['DHIS2 Option code'];
                return acc;
              }, {});

            return state;
          });

          fn(state => {
            const { OptionSets, identifiers } = state;
            const keys = OptionSets[1];

            state.optsMap = OptionSets.slice(2)
              .map(item => mapArrayToObject(item, keys))
              .filter(
                o =>
                  (isValidValue(o['External ID']) &&
                    isValidValue(o['DHIS2 DE full name'])) ||
                  (isValidValue(o['value.display - Answers']) &&
                    isValidValue(o['DHIS2 Option code']))
              )
              .map(o => {
                return {
                  'DHIS2 Option Set UID': o['DHIS2 Option Set UID'],
                  'DHIS2 Option name': o['DHIS2 Option name'],
                  'DHIS2 Option UID': o['DHIS2 Option UID'],
                  'DHIS2 Option Code': o['DHIS2 Option code'],
                  'value.display - Answers': o['Answers'],
                  'value.uuid - External ID': o['External ID'].trim(),
                  'DHIS2 DE UID': o['DHIS2 DE UID'],
                };
              });

            const [iheaders, ...irows] = identifiers;
            state.identifiers = irows
              .map(row =>
                row.reduce((obj, value, index) => {
                  if (value != null && value !== '') {
                    obj[iheaders[index]] = value;
                  }
                  return obj;
                }, {})
              )
              .filter(obj => Object.keys(obj).length > 0);
            return state;
          });

          fn(state => {
            const {
              optsMap,
              syncedAt,
              lastSync,
              targetFile,
              identifiers,
              formMetadata,
              placeOflivingMap,
            } = state;

            const sourceFile = targetFile.name;
            const fileDateModified = targetFile.lastModifiedDateTime;

            const formMaps = formMetadata.reduce((acc, form) => {
              const formName = form['OMRS form sheet name'];
              acc[form['OMRS form.uuid']] = {
                formName,
                syncType: form['Sync Type'],
                orgUnit: form['DHIS2 orgUnit ID'],
                programId: form['DHIS2 program ID'],
                programStage: form['DHIS2 programStage ID'],
                dataValueMap: safeKeyValuePairs(state[formName]),
                optionSetMap: questionKeyValuePairs(state[formName]),
                workflow: form['Workflow'],
                relationshipId: form['DHIS2 TEI Relationship Id'],
                orgUnit: form['DHIS2 Org Unit ID'],
                multiSelectQns: extractMultiQns(state[formName]),
              };

              return acc;
            }, {});

            const optionSetKey = Object.entries(formMaps).reduce(
              (acc, [formKey, formValue]) => {
                formValue.optionSetMap.forEach(item => {
                  const [originalKey, originalValue] = Object.entries(item)[0];
                  acc[`${formKey}-${originalValue}`] = originalKey;
                });
                return acc;
              },
              {}
            );

            return {
              lastSync,
              syncedAt,
              formMaps,
              optsMap,
              sourceFile,
              identifiers,
              formMetadata,
              optionSetKey,
              fileDateModified,
              placeOflivingMap,
            };
          });

      Save-option-set-json-to-collections:
        name: Save option-set json to collections
        adaptor: '@openfn/language-http@7.2.7'
        credential: null
        body: |
          // Cleanup: remove all collections data
          collections.remove('mosul-metadata-mappings-staging', '*');

          collections.set('mosul-metadata-mappings-staging', 'syncedAt', $.syncedAt);
          collections.set('mosul-metadata-mappings-staging', 'sourceFile', $.sourceFile);
          collections.set(
            'mosul-metadata-mappings-staging',
            'formMetadata',
            $.formMetadata
          );
          collections.set(
            'mosul-metadata-mappings-staging',
            'fileDateModified',
            $.fileDateModified
          );

          collections.set(
            'mosul-metadata-mappings-staging',
            'optionSetKey',
            $.optionSetKey
          );

          collections.set('mosul-metadata-mappings-staging', 'formMaps', $.formMaps);

          collections.set(
            'mosul-metadata-mappings-staging',
            'placeOflivingMap',
            $.placeOflivingMap
          );

          let itemCount = 0;
          collections.set(
            'mosul-metadata-mappings-staging',
            i => `optsMap-value-${++itemCount}`,
            $.optsMap
          );

          itemCount = 0;
          collections.set(
            'mosul-metadata-mappings-staging',
            i => `identifiers-value-${++itemCount}`,
            $.identifiers
          );

