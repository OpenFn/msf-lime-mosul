name: msf-lime-mosul-staging
description: |
  staging project for main MSF workflows

collections: null
credentials:
  aisha@openfn.org-MSF-OMRS-admin:
    name: MSF OMRS admin
    owner: aisha@openfn.org
  justin@openfn.org-Justin-GSheets:
    name: Justin-GSheets
    owner: justin@openfn.org
  justin@openfn.org-Justin-OpenFn:
    name: Justin-OpenFn
    owner: justin@openfn.org
  mtuchi@openfn.org-MSF-DHIS2-UAT:
    name: MSF DHIS2 UAT
    owner: mtuchi@openfn.org
  mtuchi@openfn.org-OpenFnSharepoint:
    name: OpenFnSharepoint
    owner: mtuchi@openfn.org
  mtuchi@openfn.org-OpenMRS-Demo:
    name: OpenMRS Demo
    owner: mtuchi@openfn.org
  mtuchi@openfn.org-mtuchi-collections-config:
    name: mtuchi-collections-config
    owner: mtuchi@openfn.org
  mtuchi@openfn.org-mtuchi-gsheet:
    name: mtuchi-gsheet
    owner: mtuchi@openfn.org
workflows:
  wf1-dhis2-omrs-migration:
    name: wf1-dhis2-omrs-migration
    jobs:
      Fetch-Metadata:
        name: Fetch Metadata
        adaptor: '@openfn/language-common@2.1.1'
        credential: null
        body:
          path: workflows/wf1-dhis2-omrs-migration/fetch-metadata.js

      Get-Teis-and-Locations:
        name: Get Teis and Locations
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: mtuchi@openfn.org-MSF-DHIS2-UAT
        body:
          path: workflows/wf1-dhis2-omrs-migration/get-teis-and-locations.js

      Create-Patients:
        name: Create Patients
        adaptor: '@openfn/language-openmrs@4.2.0'
        credential: mtuchi@openfn.org-OpenMRS-Demo
        body:
          path: workflows/wf1-dhis2-omrs-migration/create-patients.js

      Update-Teis:
        name: Update Teis
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: mtuchi@openfn.org-MSF-DHIS2-UAT
        body:
          path: workflows/wf1-dhis2-omrs-migration/update-teis.js

      Alert-Admin-of-Duplicate-TEIs:
        name: Alert Admin of Duplicate TEIs
        adaptor: '@openfn/language-common@2.1.1'
        credential: null
        body:
          path: workflows/wf1-dhis2-omrs-migration/alert-admin-of-duplicate-teis.js

      Validate-TEIs-with-OMRS-Id:
        name: Validate TEIs with OMRS Id
        adaptor: '@openfn/language-openmrs@4.2.0'
        credential: mtuchi@openfn.org-OpenMRS-Demo
        body:
          path: workflows/wf1-dhis2-omrs-migration/validate-teis-with-omrs-id.js

    triggers:
      cron:
        type: cron
        cron_expression: '0 0 * * *'
        enabled: false
    edges:
      cron->Fetch-Metadata:
        source_trigger: cron
        target_job: Fetch-Metadata
        condition_type: always
        enabled: true
      Fetch-Metadata->Get-Teis-and-Locations:
        source_job: Fetch-Metadata
        target_job: Get-Teis-and-Locations
        condition_type: on_job_success
        enabled: true
      Get-Teis-and-Locations->Create-Patients:
        source_job: Get-Teis-and-Locations
        target_job: Create-Patients
        condition_type: js_expression
        condition_label: has-teis
        condition_expression: |
          state.uniqueTeis.length > 0 && !state.errors

        enabled: true
      Create-Patients->Update-Teis:
        source_job: Create-Patients
        target_job: Update-Teis
        condition_type: on_job_success
        enabled: true
      Get-Teis-and-Locations->Alert-Admin-of-Duplicate-TEIs:
        source_job: Get-Teis-and-Locations
        target_job: Alert-Admin-of-Duplicate-TEIs
        condition_type: js_expression
        condition_label: has-duplicate-patients
        condition_expression: |
          state.duplicatePatients.length > 0 && !state.errors

        enabled: true
      Get-Teis-and-Locations->Validate-TEIs-with-OMRS-Id:
        source_job: Get-Teis-and-Locations
        target_job: Validate-TEIs-with-OMRS-Id
        condition_type: js_expression
        condition_label: has-teisWithOMRSID
        condition_expression: |
          !state.errors && state. teisWithOMRSID.length > 0

        enabled: true
  wf2-omrs-dhis2:
    name: wf2-omrs-dhis2
    jobs:
      Get-Patients:
        name: Get Patients
        adaptor: '@openfn/language-openmrs@4.3.0'
        credential: mtuchi@openfn.org-OpenMRS-Demo
        body:
          path: workflows/wf2-omrs-dhis2/get-patients.js

      Mappings:
        name: Mappings
        adaptor: '@openfn/language-common@2.1.1'
        credential: mtuchi@openfn.org-mtuchi-collections-config
        body:
          path: workflows/wf2-omrs-dhis2/mappings.js

      Upsert-TEIs:
        name: Upsert TEIs
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: mtuchi@openfn.org-MSF-DHIS2-UAT
        body:
          path: workflows/wf2-omrs-dhis2/upsert-teis.js

      Get-Encounters:
        name: Get Encounters
        adaptor: '@openfn/language-openmrs@4.3.0'
        credential: mtuchi@openfn.org-OpenMRS-Demo
        body:
          path: workflows/wf2-omrs-dhis2/get-encounters.js

      Get-Parent-and-Child-TEIs:
        name: Get Parent and Child TEIs
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: mtuchi@openfn.org-MSF-DHIS2-UAT
        body:
          path: workflows/wf2-omrs-dhis2/get-parent-and-child-teis.js

      Create-Events:
        name: Create Events
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: mtuchi@openfn.org-MSF-DHIS2-UAT
        body:
          path: workflows/wf2-omrs-dhis2/create-events.js

      Update-TEIs:
        name: Update TEIs
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: mtuchi@openfn.org-MSF-DHIS2-UAT
        body:
          path: workflows/wf2-omrs-dhis2/update-teis.js

      Event-Mappings:
        name: Event Mappings
        adaptor: '@openfn/language-common@2.1.1'
        credential: null
        body:
          path: workflows/wf2-omrs-dhis2/event-mappings.js

      Create-TEIs-Relationship:
        name: Create TEIs Relationship
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: mtuchi@openfn.org-MSF-DHIS2-UAT
        body:
          path: workflows/wf2-omrs-dhis2/create-teis-relationship.js

      Create-Child-TEIs:
        name: Create Child TEIs
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: mtuchi@openfn.org-MSF-DHIS2-UAT
        body:
          path: workflows/wf2-omrs-dhis2/create-child-teis.js

      Missing-OptionSets:
        name: Missing OptionSets
        adaptor: '@openfn/language-googlesheets@4.0.7'
        credential: mtuchi@openfn.org-mtuchi-gsheet
        body: |
          // Only run if there are missing option sets to report
          fn((state) => {
            const CHUNK_SIZE = 10000;
            const missingOptsets = state.missingOptsets;

            const headers = [
              "Timestamp",
              "OpenMRS Question",
              "Concept External ID",
              "Answer Display",
              "Answer UUID",
              "DHIS2 DE UID",
              "DHIS2 OptionSet UID",
              "Metadata Form",
              "Encounter UUID",
              "Patient UUID",
              "Source File",
            ];

            const allRows = missingOptsets.map((opt) => [
              opt.timestamp,
              opt.openMrsQuestion,
              opt.conceptExternalId,
              opt.answerDisplay,
              opt.answerValueUuid,
              opt.dhis2DataElementUid,
              opt.dhis2OptionSetUid,
              opt.metadataFormName,
              opt.encounterUuid,
              opt.patientUuid,
              opt.sourceFile,
            ]);

            state.allRows = allRows;
            state.headers = headers;

            return state;
          });

          // Get existing data to check for duplicates
          getValues(
            "13yjqiejKFf6HlNCvgfgaKNi9Gffhq22RUTwXKUPR36k",
            "Missing OptionSets Mappings"
          );

          // Filter duplicates and prepare chunks
          const CHUNK_SIZE = 10000;
          fn((state) => {
            const allRows = state.allRows;

            // Get existing data (skip header row)
            const existingData = state.data?.values?.slice(1) || [];

            // Create a Set of unique keys from existing data
            // Key format: conceptExternalId|answerUuid|dhis2DeUid|encounterUuid
            const existingKeys = new Set(
              existingData.map(row => `${row[2]}|${row[4]}|${row[5]}|${row[8]}`)
            );

            // Filter out duplicates
            const newRows = allRows.filter(row => {
              const key = `${row[2]}|${row[4]}|${row[5]}|${row[8]}`;
              return !existingKeys.has(key);
            });

            console.log(`Total errors found: ${allRows.length}`);
            console.log(`New unique errors to add: ${newRows.length}`);
            console.log(`Duplicates filtered out: ${allRows.length - newRows.length}`);

            const chunks = [];
            for (let i = 0; i < newRows.length; i += CHUNK_SIZE) {
              chunks.push(newRows.slice(i, i + CHUNK_SIZE));
            }

            const nextRow = existingData.length + 2; // +2 for header and 1-indexing

            state.chunks = chunks;
            state.nextRow = nextRow;
            state.newRowCount = newRows.length;

            return state;
          });

          // Append data chunks (will add after existing rows)
          each(
            (state) => state.chunks,
            batchUpdateValues({
              spreadsheetId: "13yjqiejKFf6HlNCvgfgaKNi9Gffhq22RUTwXKUPR36k",
              range: (state) => {
                const currentChunkIndex = state.index;
                const startRow = state.nextRow + (currentChunkIndex * CHUNK_SIZE);
                return `Missing OptionSets Mappings!A${startRow}`;
              },
              values: (state) => state.data,
            })
          );

          // Log summary statistics
          fn((state) => {
            if (state.missingOptsets && state.missingOptsets.length > 0) {
              const totalErrors = state.missingOptsets.length;
              const uniqueOptionSets = new Set(
                state.missingOptsets.map((opt) => opt.dhis2OptionSetUid),
              ).size;
              const uniqueDataElements = new Set(
                state.missingOptsets.map((opt) => opt.dhis2DataElementUid),
              ).size;

              const googleSheetUrl =
                "https://docs.google.com/spreadsheets/d/13yjqiejKFf6HlNCvgfgaKNi9Gffhq22RUTwXKUPR36k/edit#gid=0";

              console.log("");
              console.log("⚠️  Missing DHIS2 Option Codes Detected");
              console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
              console.log(`Metadata File: ${state.sourceFile}`);
              console.log(`Total Errors: ${totalErrors}`);
              console.log(`Affected Option Sets: ${uniqueOptionSets}`);
              console.log(`Affected Data Elements: ${uniqueDataElements}`);
              console.log(`View Details: ${googleSheetUrl}`);
              console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
              console.log("");
            } else {
              console.log("✅ No missing DHIS2 Option Codes detected");
            }

            return { lastRunDateTime: state.lastRunDateTime };
          });
    triggers:
      cron:
        type: cron
        cron_expression: '0 0 * * *'
        enabled: true
    edges:
      Upsert-TEIs->Get-Encounters:
        source_job: Upsert-TEIs
        target_job: Get-Encounters
        condition_type: js_expression
        condition_label: has-patient-uuids
        condition_expression: |
          state.patientUuids.length > 0 && !state.errors

        enabled: true
      cron->Get-Patients:
        source_trigger: cron
        target_job: Get-Patients
        condition_type: always
        enabled: true
      Mappings->Upsert-TEIs:
        source_job: Mappings
        target_job: Upsert-TEIs
        condition_type: js_expression
        condition_label: has-patients
        condition_expression: |
          state.patients.length > 0 && !state.errors

        enabled: true
      Mappings->Get-Encounters:
        source_job: Mappings
        target_job: Get-Encounters
        condition_type: js_expression
        condition_label: has-no-patients
        condition_expression: |
          !state.errors && state.patients.length === 0

        enabled: true
      Create-Events->Update-TEIs:
        source_job: Create-Events
        target_job: Update-TEIs
        condition_type: js_expression
        condition_label: has-gender-updated
        condition_expression: |
          state?.teisToUpdate?.length > 0

        enabled: true
      Get-Patients->Mappings:
        source_job: Get-Patients
        target_job: Mappings
        condition_type: on_job_success
        enabled: true
      Event-Mappings->Create-Events:
        source_job: Event-Mappings
        target_job: Create-Events
        condition_type: js_expression
        condition_label: has-events
        condition_expression: |
          state?.eventsMapping?.length > 0 && !state.errors

        enabled: true
      Get-Parent-and-Child-TEIs->Create-Child-TEIs:
        source_job: Get-Parent-and-Child-TEIs
        target_job: Create-Child-TEIs
        condition_type: js_expression
        condition_label: has-child-teis-to-create
        condition_expression: |
          !state.errors && Object.keys(state?.childTeisToCreate).length > 0
        enabled: true
      Create-Child-TEIs->Create-TEIs-Relationship:
        source_job: Create-Child-TEIs
        target_job: Create-TEIs-Relationship
        condition_type: on_job_success
        enabled: true
      Create-TEIs-Relationship->Event-Mappings:
        source_job: Create-TEIs-Relationship
        target_job: Event-Mappings
        condition_type: on_job_success
        enabled: true
      Get-Encounters->Get-Parent-and-Child-TEIs:
        source_job: Get-Encounters
        target_job: Get-Parent-and-Child-TEIs
        condition_type: js_expression
        condition_label: has-encounters
        condition_expression: |
          !state.errors && state.encounters?.length > 0

        enabled: true
      Get-Parent-and-Child-TEIs->Event-Mappings:
        source_job: Get-Parent-and-Child-TEIs
        target_job: Event-Mappings
        condition_type: js_expression
        condition_label: has-existing-teis
        condition_expression: |
          !state.errors && Object.keys(state?.childTeisToCreate).length === 0 && state?.existingTeis
        enabled: true
      Event-Mappings->Missing-OptionSets:
        source_job: Event-Mappings
        target_job: Missing-OptionSets
        condition_type: js_expression
        condition_label: missing-opts
        condition_expression: |
          !state.errors && state.missingOptsets.length > 0
        enabled: true
