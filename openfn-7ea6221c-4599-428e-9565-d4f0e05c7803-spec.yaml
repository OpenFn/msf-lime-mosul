description: |
  staging project for main MSF workflows

collections:
  mosul-metadata-mappings:
    name: mosul-metadata-mappings
channels: null
credentials:
  aisha@openfn.org-MSF-OMRS-admin:
    name: MSF OMRS admin
    owner: aisha@openfn.org
  justin@openfn.org-Justin-GSheets:
    name: Justin-GSheets
    owner: justin@openfn.org
  justin@openfn.org-Justin-OpenFn:
    name: Justin-OpenFn
    owner: justin@openfn.org
  ludovic.rossel@geneva.msf.org-LIME-OpenFn-Credential:
    name: LIME OpenFn Credential
    owner: ludovic.rossel@geneva.msf.org
  mtuchi@openfn.org-MSF-DHIS2-UAT:
    name: MSF DHIS2 UAT
    owner: mtuchi@openfn.org
  mtuchi@openfn.org-OpenFnSharepoint:
    name: OpenFnSharepoint
    owner: mtuchi@openfn.org
  mtuchi@openfn.org-OpenMRS-Demo:
    name: OpenMRS Demo
    owner: mtuchi@openfn.org
